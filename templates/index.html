<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>DiskScope - 磁盘空间透视眼</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/echarts.min.js"></script>
</head>
<body>
    <header>
        <button id="btn-root">📀 返回根目录</button>
        <button id="btn-up">⬆ 向上级</button>
        <span style="margin-left: auto;">DiskScope</span>
    </header>
    <main>
        <div class="left-panel">
            <div class="tree" id="tree"></div>
        </div>
        <div class="right-panel">
            <div id="chart-container"></div>
            <div id="placeholder" class="placeholder">请点击左侧磁盘开始分析</div>
            <div id="progress-overlay" class="hidden">
                <div>正在扫描...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div id="progress-text"></div>
            </div>
        </div>
    </main>
    <div id="startup-overlay" class="hidden">
        <div class="startup-box">
            <div class="startup-title">正在扫描所有磁盘…</div>
            <div class="progress-bar">
                <div class="progress-fill" id="startup-fill"></div>
            </div>
            <div id="startup-text">准备中…</div>
            <div id="startup-drives"></div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
